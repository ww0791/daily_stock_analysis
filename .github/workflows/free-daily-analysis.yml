name: Free Daily Stock Analysis

on:
  schedule:
    # 18:10 Beijing time, Monday-Friday.
    - cron: "10 10 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - stocks-only
          - market-only
          - full
      stock_list:
        description: "Comma-separated stock codes. Empty = use repository variable STOCK_LIST."
        required: false
        default: ""
        type: string
      force_run:
        description: "Skip trading-day check"
        required: false
        default: true
        type: boolean

concurrency:
  group: free-daily-stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p data logs reports

      - name: Run analysis with free data sources
        env:
          # AI: configure either DeepSeek or OpenAI.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEYS: ${{ secrets.DEEPSEEK_API_KEYS }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL || 'deepseek/deepseek-chat' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Stocks: manual input > repository variable/secret > safe sample.
          INPUT_STOCK_LIST: ${{ github.event.inputs.stock_list }}
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}

          # Free market-data providers only. No Tushare / TickFlow / Longbridge key is needed.
          REALTIME_SOURCE_PRIORITY: tencent,akshare_sina,efinance,akshare_em
          PREFETCH_REALTIME_QUOTES: "true"
          ENABLE_CHIP_DISTRIBUTION: "false"
          ALPHASIFT_ENABLED: "false"

          # Recommendation quality defaults.
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'full' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'zh' }}
          DAILY_MARKET_CONTEXT_ENABLED: "true"
          SINGLE_STOCK_NOTIFY: "false"
          MARKET_REVIEW_ENABLED: "true"

          # Feishu delivery. Simple setup: configure FEISHU_WEBHOOK_URL.
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          FEISHU_MAX_BYTES: ${{ vars.FEISHU_MAX_BYTES || secrets.FEISHU_MAX_BYTES || '20000' }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ vars.FEISHU_CHAT_ID || secrets.FEISHU_CHAT_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ vars.FEISHU_RECEIVE_ID_TYPE || secrets.FEISHU_RECEIVE_ID_TYPE || 'chat_id' }}
          FEISHU_DOMAIN: ${{ vars.FEISHU_DOMAIN || secrets.FEISHU_DOMAIN || 'feishu' }}
          NOTIFICATION_REPORT_CHANNELS: ${{ vars.NOTIFICATION_REPORT_CHANNELS || secrets.NOTIFICATION_REPORT_CHANNELS || 'feishu' }}

          LOG_LEVEL: INFO
          MAX_WORKERS: "1"
          TRADING_DAY_CHECK_ENABLED: "true"
          SEARXNG_PUBLIC_INSTANCES_ENABLED: "true"
        run: |
          if [ -n "${INPUT_STOCK_LIST:-}" ]; then
            export STOCK_LIST="$INPUT_STOCK_LIST"
          elif [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          else
            export STOCK_LIST="600519"
          fi

          if [ -z "${DEEPSEEK_API_KEY:-}" ] && [ -z "${DEEPSEEK_API_KEYS:-}" ] && [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Missing AI secret. Configure DEEPSEEK_API_KEY or OPENAI_API_KEY."
            exit 1
          fi

          echo "Mode: ${{ github.event.inputs.mode || 'full' }}"
          echo "Stocks: $STOCK_LIST"
          echo "LiteLLM model: $LITELLM_MODEL"
          echo "Report type: $REPORT_TYPE"
          echo "Feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] || { [ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ] && [ -n "$FEISHU_CHAT_ID" ]; } && echo configured || echo not-configured)"
          echo "Realtime sources: $REALTIME_SOURCE_PRIORITY"

          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run || 'false' }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "full" ]; then
            python main.py $FORCE_RUN_ARG
          else
            python main.py --no-market-review $FORCE_RUN_ARG
          fi

      - name: Upload reports and logs
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: free-analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Show generated files
        if: always()
        run: |
          echo "Reports:"
          find reports -maxdepth 2 -type f -print 2>/dev/null || true
          echo "Logs:"
          find logs -maxdepth 2 -type f -print 2>/dev/null || true
